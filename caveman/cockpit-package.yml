name: "caveman"
version: "1.1.0"
description: "Deploys the caveman skill to all active AI providers — cuts ~75% of output tokens by responding like caveman while keeping full technical accuracy"
author: "AICockpit Team"
license: "MIT"
homepage: "https://github.com/JuliusBrussee/caveman"
repository: "https://github.com/lleitep3/cockpit-registry"

type: "skill"
category: "productivity"

requirements:
  cockpit: ">=0.3.0"

features:
  skills:
    - path: "skills/caveman"
      name: "caveman"
      description: "Ultra-compressed communication mode (~75% token reduction)"

  gold_rules:
    - "When the user says 'caveman mode', 'talk like caveman', 'less tokens', or '/caveman', activate caveman mode: respond terse like smart caveman, drop filler/articles, keep all technical accuracy."

installation:
  supported_providers:
    - antigravity
    - devin
    - goose

  provider_features:
    antigravity:
      - skills
    devin:
      - skills
    goose:
      - skills

  method: "copy"

metadata:
  tags:
    - tokens
    - productivity
    - skills
    - caveman
    - compression

  keywords:
    - token
    - reduction
    - output
    - terse
    - brevity
    - caveman

  maintainers:
    - name: "AICockpit Team"
      email: "team@aicockpit.dev"

  status: "stable"

  support:
    issues: "https://github.com/lleitep3/cockpit-registry/issues"
    documentation: "https://github.com/lleitep3/cockpit-registry/tree/main/caveman"
