name: "caveman"
version: "1.0.0"
description: "Deploys the caveman skill to all active AI providers — cuts ~75% of output tokens by responding like caveman while keeping full technical accuracy"
author: "AICockpit Team"
license: "MIT"
homepage: "https://github.com/JuliusBrussee/caveman"
repository: "https://github.com/lleitep3/cockpit-registry"

type: "skill"
category: "productivity"

requirements:
  cockpit: ">=0.3.0"

features:
  skills:
    - path: "skills/antigravity/SKILL.md"
      name: "caveman-antigravity"
      description: "Caveman skill for Antigravity (Google DeepMind)"
    - path: "skills/devin/SKILL.md"
      name: "caveman-devin"
      description: "Caveman skill for Devin (Cognition AI)"
    - path: "skills/goose/SKILL.md"
      name: "caveman-goose"
      description: "Caveman skill for Goose (Block)"

installation:
  supported_providers:
    - antigravity
    - devin
    - goose

  provider_features:
    antigravity:
      - skills
    devin:
      - skills
    goose:
      - skills

  method: "copy"

  post_install:
    - script: "scripts/deploy-skills.sh"
      description: "Deploy caveman skills to each active AI provider"

  pre_uninstall:
    - script: "scripts/remove-skills.sh"
      description: "Remove caveman skills from AI providers"

metadata:
  tags:
    - tokens
    - productivity
    - skills
    - caveman
    - compression

  keywords:
    - token
    - reduction
    - output
    - terse
    - brevity
    - caveman

  maintainers:
    - name: "AICockpit Team"
      email: "team@aicockpit.dev"

  status: "stable"

  support:
    issues: "https://github.com/lleitep3/cockpit-registry/issues"
    documentation: "https://github.com/lleitep3/cockpit-registry/tree/main/caveman"
