<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.CourseTitle}}</title>
    <link rel="stylesheet" href="./styles/main.css">
    <!-- highlight.js for code formatting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
</head>
<body class="dark-mode">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Cockpit Learn</h2>
                <button class="close-sidebar-btn" id="closeSidebarBtn">&times;</button>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    {{range .Articles}}
                    <li><a href="#article-{{.ID}}">{{.Title}}</a></li>
                    {{end}}
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <button class="menu-btn" id="menuBtn">&#9776;</button>
                <div class="course-title">{{.CourseTitle}}</div>
                <div class="actions">
                    <button id="themeToggleBtn" class="theme-btn">☀️/🌙</button>
                </div>
            </header>

            <!-- Content Area -->
            <div class="articles-container">
                {{range .Articles}}
                <article class="article-body" id="article-{{.ID}}">
                    <section class="hero-banner">
                        <div class="hero-content">
                            <h1>{{.Title}}</h1>
                            <p>{{.Description}}</p>
                        </div>
                    </section>
                    <div class="article-content">
                        {{.ContentHTML}}
                    </div>
                </article>
                {{end}}
            </div>

            <!-- Footer -->
            <footer class="footer">
                <p>Generated by AICockpit Article Creator.</p>
            </footer>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="./scripts/main.js"></script>
</body>
</html>
