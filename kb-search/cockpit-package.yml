name: "kb-search"
version: "1.1.0"
description: "Deploys KB search skills to all active AI providers so they automatically search the local Knowledge Base before responding"
author: "AICockpit Team"
license: "MIT"
homepage: "https://github.com/lleitep3/cockpit-registry"
repository: "https://github.com/lleitep3/cockpit-registry"

type: "skill"
category: "productivity"

requirements:
  cockpit: ">=0.3.0"

features:
  skills:
    - path: ".cockpit/skills/kb-search"
      name: "kb-search"
      description: "Search the local Knowledge Base before responding"

  kb:
    - path: "kb/guides/kb-overview.md"
      type: "guide"
    - path: "kb/guides/adding-documents.md"
      type: "guide"
    - path: "kb/references/document-format.md"
      type: "reference"

  gold_rules:
    - "Always search the local Knowledge Base before answering questions about this project: cockpit kb search \"<query>\""

installation:
  supported_providers:
    - antigravity
    - devin
    - goose

  provider_features:
    antigravity:
      - skills
      - kb
    devin:
      - skills
      - kb
    goose:
      - skills
      - kb

  method: "copy"

metadata:
  tags:
    - kb
    - knowledge-base
    - search
    - productivity
    - skills

  keywords:
    - knowledge
    - base
    - search
    - skill
    - documentation

  maintainers:
    - name: "AICockpit Team"
      email: "team@aicockpit.dev"

  status: "stable"

  support:
    issues: "https://github.com/lleitep3/cockpit-registry/issues"
    documentation: "https://github.com/lleitep3/cockpit-registry/tree/main/kb-search"
